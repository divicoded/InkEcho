                borderClass: 'border-emerald-500/30',
                glowColor: '52, 211, 153',
                blobColors: ['bg-emerald-500/20', 'bg-teal-500/20'],
                gradient: { light: 'linear-gradient(to bottom, #ecfdf5, #a7f3d0)', dark: 'linear-gradient(to bottom, #022c22, #064e3b)' },
                particleConfig: { type: 'leaf', speed: 0.5, density: 45, colors: ['#34d399', '#10b981', '#fbbf24'] }
            },
            'Longing': {
                icon: 'fa-wind',
                accentClass: 'text-cyan-400',
                borderClass: 'border-cyan-500/30',
                glowColor: '34, 211, 238',
                blobColors: ['bg-cyan-500/20', 'bg-sky-600/20'],
                gradient: { light: 'linear-gradient(to bottom, #ecfeff, #bae6fd)', dark: 'linear-gradient(to bottom, #083344, #155e75)' },
                particleConfig: { type: 'mist', speed: 0.5, density: 55, colors: ['#22d3ee', '#7dd3fc'] }
            },
            'default': {
                icon: 'fa-pen-nib',
                accentClass: 'text-gold-400',
                borderClass: 'border-gold-500/30',
                glowColor: '212, 175, 55',
                blobColors: ['bg-blue-500/10', 'bg-purple-500/10'],
                gradient: { light: '', dark: '' }, // Uses CSS default
                particleConfig: { type: 'circle', speed: 0.3, density: 60, colors: ['#fbbf24', '#ffffff'] }
            }
        };

        const getTheme = (cat) => categoryThemes[cat] || categoryThemes['default'];

        // --- Core Functions ---

        const init = async () => {
            // Theme Setup
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                isDarkMode = savedTheme === 'dark';
            } else {
                isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            applyTheme();

            // Load Data (Embedded)
            poems = POEMS_DATA;
            renderGrid();

            // Init Engine
            initAnimations();
            sceneManager = new SceneManager();
            
            // Loading Sequence
            setTimeout(() => {
                document.getElementById('loader-text').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        triggerHeroAnimations();
                    }, 800);
                }, 1500);
            }, 500);
        };

        const toggleTheme = () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
            // Update background if active scene
            if(sceneManager) sceneManager.refreshBackground();
        };

        const applyTheme = () => {
            const html = document.documentElement;
            if (isDarkMode) html.classList.add('dark');
            else html.classList.remove('dark');
        };

        const renderGrid = () => {
            const grid = document.getElementById('poems-grid');
            grid.innerHTML = poems.map((poem, index) => {
                const theme = getTheme(poem.category);
                const glowRgb = theme.glowColor; 
                return `
                <article 
                    class="poem-card group relative glass-card rounded-xl p-8 cursor-pointer"
                    data-index="${index}"
                    data-category="${poem.category}"
                    onclick="openModal(${index})"
                    onmouseenter="handleCardEnter(this, '${glowRgb}')"
                    onmousemove="handleCardTilt(event, this, '${glowRgb}')"
                    onmouseleave="handleCardLeave(this)"
                >
                    <div class="card-glow" style="background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(${glowRgb}, 0.15), transparent 40%);"></div>
                    
                    <div class="relative z-10 flex flex-col h-full pointer-events-none">
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[10px] font-bold uppercase tracking-widest ${theme.accentClass} border ${theme.borderClass} px-2 py-1 rounded transition-colors duration-300">
                                ${poem.category}
                            </span>
                            <span class="font-serif italic text-slate-400 text-sm">
                                ${new Date(poem.date).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}
                            </span>
                        </div>
                        
                        <h3 class="font-serif text-2xl md:text-3xl font-bold mb-4 text-slate-800 dark:text-slate-100 group-hover:${theme.accentClass} transition-colors duration-300">
                            ${poem.title}
                        </h3>
                        
                        <p class="font-serif text-lg text-slate-600 dark:text-slate-400 italic leading-relaxed line-clamp-3 mb-6">
                            ${poem.preview}
                        </p>
                        
                        <div class="mt-auto pt-4 border-t border-slate-200 dark:border-white/10 flex justify-between items-center opacity-60 group-hover:opacity-100 transition-opacity duration-300">
                            <span class="text-xs uppercase tracking-widest font-sans">Read Poem</span>
                            <i class="fas ${theme.icon} text-sm transform -translate-x-2 group-hover:translate-x-0 transition-transform duration-300 ${theme.accentClass}"></i>
                        </div>
                    </div>
                </article>
            `}).join('');
        };

        // --- GSAP Animations ---

        const initAnimations = () => {
            gsap.registerPlugin(ScrollTrigger);
        };

        const triggerHeroAnimations = () => {
            const tl = gsap.timeline();
            tl.to('.animate-gsap-hero', { y: 0, opacity: 1, duration: 1.2, stagger: 0.2, ease: 'power3.out' })
              .to('.animate-gsap-hero-line', { scaleX: 1, opacity: 1, duration: 1, ease: 'expo.out' }, "-=0.8")
              .to('.animate-gsap-scroll', { opacity: 0.7, y: 0, duration: 1, delay: 0.5 });

            initScrollAnimations();
        };

        const initScrollAnimations = () => {
            const cards = document.querySelectorAll('.poem-card');
            cards.forEach((card) => {
                const category = card.getAttribute('data-category');
                let fromVars = { opacity: 0, y: 50 };
                let toVars = { opacity: 1, y: 0, duration: 1, ease: 'power3.out' };

                switch(category) {
                    case 'Love':
                        fromVars = { opacity: 0, scale: 0.9, y: 20 };
                        toVars = { opacity: 1, scale: 1, y: 0, duration: 1.2, ease: 'back.out(1.5)' };
                        break;
                    case 'Nature':
                        fromVars = { opacity: 0, y: 60, rotation: 2 };
                        toVars = { opacity: 1, y: 0, rotation: 0, duration: 1.4, ease: 'power2.out' };
                        break;
                    case 'Dreams':
                        fromVars = { opacity: 0, y: 30, filter: 'blur(10px)' };
                        toVars = { opacity: 1, y: 0, filter: 'blur(0px)', duration: 1.5, ease: 'sine.out' };
                        break;
                    case 'Reflection':
                    case 'Reflective':
                        fromVars = { opacity: 0, scale: 0.95, filter: 'grayscale(100%)' };
                        toVars = { opacity: 1, scale: 1, filter: 'grayscale(0%)', duration: 1.5, ease: 'power2.inOut' };
                        break;
                    case 'Longing':
                        fromVars = { opacity: 0, x: -40 };
                        toVars = { opacity: 1, x: 0, duration: 1.3, ease: 'power2.out' };
                        break;
                }

                gsap.fromTo(card, fromVars, {
                    ...toVars,
                    scrollTrigger: {
                        trigger: card,
                        start: "top 85%",
                        toggleActions: "play none none reverse"
                    }
                });
            });
        };

        // --- Interaction Logic ---

        window.handleCardEnter = (card, glowRgb) => {
            gsap.to(card, { scale: 1.03, boxShadow: `0 20px 50px -10px rgba(${glowRgb}, 0.3)`, duration: 0.4, ease: 'power2.out' });
            gsap.to(card.querySelector('.card-glow'), { opacity: 1, duration: 0.3 });
        };

        window.handleCardTilt = (e, card, glowRgb) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -5;
            const rotateY = ((x - centerX) / centerX) * 5;
            gsap.to(card, { rotateX: rotateX, rotateY: rotateY, transformPerspective: 1000, duration: 0.1, ease: 'none' });
        };

        window.handleCardLeave = (card) => {
            gsap.to(card, { scale: 1, rotateX: 0, rotateY: 0, boxShadow: '0 4px 30px rgba(0, 0, 0, 0.1)', duration: 0.6, ease: 'elastic.out(1, 0.5)' });
            gsap.to(card.querySelector('.card-glow'), { opacity: 0, duration: 0.3 });
        };

        // --- Modal & Scene Switching ---

        window.openModal = (index) => {
            const poem = poems[index];
            const theme = getTheme(poem.category);

            // Populate Modal
            document.getElementById('modal-title').innerText = poem.title;
            document.getElementById('modal-body').innerText = poem.body;
            document.getElementById('modal-category').innerText = poem.category;
            document.getElementById('modal-date').innerText = new Date(poem.date).toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
            
            // Style Updates
            const catBadge = document.getElementById('modal-category');
            catBadge.className = `px-3 py-1 text-[10px] font-bold uppercase tracking-widest rounded-full transition-colors duration-300 border bg-opacity-20 ${theme.borderClass} ${theme.accentClass} dark:bg-slate-800`;
            
            const blob1 = document.getElementById('modal-blob-1');
            const blob2 = document.getElementById('modal-blob-2');
            blob1.className = `absolute top-0 right-0 w-96 h-96 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2 transition-colors duration-700 ${theme.blobColors[0]}`;
            blob2.className = `absolute bottom-0 left-0 w-96 h-96 rounded-full blur-3xl transform -translate-x-1/2 translate-y-1/2 transition-colors duration-700 ${theme.blobColors[1]}`;

            // Activate Theme
            if(sceneManager) sceneManager.switchTheme(theme);

            const modal = document.getElementById('poem-modal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        const closeModal = () => {
            const modal = document.getElementById('poem-modal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            
            // Revert to default
            if(sceneManager) sceneManager.switchTheme(categoryThemes['default']);
        };

        // --- Advanced Scene Manager ---

        class SceneManager {
            constructor() {
                this.canvas = document.getElementById('bg-canvas');
                this.bgLayer = document.getElementById('bg-layer');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.currentTheme = categoryThemes['default'];
                this.config = this.currentTheme.particleConfig;
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                this.initParticles();
            }

            refreshBackground() {
                // Apply gradient based on mode
                const gradient = isDarkMode ? this.currentTheme.gradient.dark : this.currentTheme.gradient.light;
                this.bgLayer.style.background = gradient;
            }

            switchTheme(newTheme) {
                this.currentTheme = newTheme;
                this.config = newTheme.particleConfig;
                
                this.refreshBackground();

                // Transition effect
                this.canvas.style.opacity = 0;
                setTimeout(() => {
                    this.initParticles();
                    this.canvas.style.opacity = 1;
                }, 300);
            }

            initParticles() {
                this.particles = [];
                const count = Math.min(this.width * 0.15, this.config.density * 2);
                for(let i = 0; i < count; i++) {
                    this.particles.push(new Particle(this.width, this.height, this.config));
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                // Subtle global movement or camera drift could go here
                
                this.particles.forEach(p => {
                    p.update();
                    p.draw(this.ctx);
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        class Particle {
            constructor(w, h, config) {
                this.w = w;
                this.h = h;
                this.config = config;
                this.reset(true);
            }

            reset(initial = false) {
                this.x = Math.random() * this.w;
                this.y = initial ? Math.random() * this.h : (this.config.type === 'heart' ? this.h + 20 : -20);
                if (this.config.type === 'star') this.y = Math.random() * this.h; // Stars stay in place roughly
                
                // Depth factor (0.5 to 1.5)
                this.z = Math.random() * 1 + 0.5; 
                this.size = (Math.random() * 3 + 1) * this.z;
                
                this.color = this.config.colors[Math.floor(Math.random() * this.config.colors.length)];
                this.opacity = (Math.random() * 0.5 + 0.2) * (isDarkMode ? 0.8 : 0.6);
                
                const speedMult = this.config.speed * this.z;
                this.vx = (Math.random() - 0.5) * speedMult;
                this.vy = (Math.random() - 0.5) * speedMult;
                
                // Specialized Physics
                if(this.config.type === 'leaf') {
                    this.vy = (Math.random() * 1 + 0.5) * speedMult; 
                    this.vx = (Math.random() * 2 - 1) * speedMult + 0.5; // Drift right
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = (Math.random() - 0.5) * 2;
                } else if (this.config.type === 'heart') {
                    this.vy = -(Math.random() * 1 + 0.5) * speedMult; // Up
                    this.vx = Math.sin(Math.random() * Math.PI * 2) * 0.5; // Wobble later
                } else if (this.config.type === 'mist') {
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.1;
                } else if (this.config.type === 'star') {
                    this.vx = (Math.random() - 0.5) * 0.05;
                    this.vy = (Math.random() - 0.5) * 0.05;
                    this.pulseSpeed = Math.random() * 0.02 + 0.01;
                    this.pulse = Math.random() * Math.PI;
                } else if (this.config.type === 'fragment') {
                    this.vy = (Math.random() * 0.5 + 0.2) * speedMult; // Slow fall
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.5;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Heart wobble
                if (this.config.type === 'heart') {
                    this.x += Math.sin(this.y * 0.05) * 0.2;
                }

                // Star Pulse
                if (this.config.type === 'star') {
                    this.pulse += this.pulseSpeed;
                    this.opacity = (Math.sin(this.pulse) * 0.2 + 0.6) * (isDarkMode ? 0.8 : 0.5);
                }

                if (this.config.type === 'leaf' || this.config.type === 'fragment') {
                    this.rotation += this.rotationSpeed;
                }

                // Boundaries & Reset
                if (this.y < -50 || this.y > this.h + 50 || this.x < -50 || this.x > this.w + 50) {
                    this.reset();
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);

                if (this.config.type === 'leaf') {
                    ctx.rotate((this.rotation * Math.PI) / 180);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * 2, this.size, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.config.type === 'heart') {
                    const s = this.size * 0.8;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(-s, -s, -s*2, s/2, 0, s*2);
                    ctx.bezierCurveTo(s*2, s/2, s, -s, 0, 0);
                    ctx.fill();
                } else if (this.config.type === 'star') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.8, 0, Math.PI * 2);
                    ctx.shadowBlur = 10 * this.z;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                } else if (this.config.type === 'fragment') {
                    ctx.rotate((this.rotation * Math.PI) / 180);
                    ctx.beginPath();
                    ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // --- Custom Cursor ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        const hoverElements = 'a, button, .poem-card';
        document.body.addEventListener('mouseover', (e) => {
            if(e.target.closest(hoverElements)) {
                cursor.style.transform = 'translate(-50%, -50%) scale(1.5)';
                cursor.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
            }
        });
        document.body.addEventListener('mouseout', (e) => {
            if(e.target.closest(hoverElements)) {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                cursor.style.backgroundColor = 'transparent';
            }
        });

        // Event Listeners
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        document.getElementById('close-modal').addEventListener('click', closeModal);
        document.getElementById('poem-modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('poem-modal')) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') closeModal();
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', init);

    </script>
<script type="module" src="/index.tsx"></script>
